<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>My Web App</title>

<!-- PWA SETTINGS -->
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyApp">
<meta name="application-name" content="MyApp">

<!-- APP ICON -->
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<link rel="apple-touch-icon"
href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<!-- MANIFEST -->
<link rel="manifest" id="manifest-placeholder">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial,sans-serif;
    -webkit-user-select:none;
    user-select:none;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

.app{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#000,#111,#222);
    color:white;
    text-align:center;
    padding:20px;
}

.app img{
    width:120px;
    height:120px;
    border-radius:30px;
    margin-bottom:20px;
    box-shadow:0 0 25px rgba(255,255,255,0.3);
}

h1{
    font-size:34px;
    margin-bottom:10px;
}

p{
    font-size:18px;
    opacity:0.8;
}
</style>
</head>

<body>

<div class="app">

    <!-- APP ICON IMAGE -->
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

    <h1>Fullscreen Web App</h1>
    <p>Add To Home Screen करके चलाओ</p>

</div>

<script>

/* DYNAMIC MANIFEST */
const manifestData = {
    "name": "MyApp",
    "short_name": "MyApp",
    "start_url": ".",
    "display": "standalone",
    "background_color": "#000000",
    "theme_color": "#000000",
    "orientation": "portrait",

    "icons": [
        {
            "src": "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
            "sizes": "192x192",
            "type": "image/png"
        },
        {
            "src": "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
            "sizes": "512x512",
            "type": "image/png"
        }
    ]
};

const stringManifest = JSON.stringify(manifestData);

const blob = new Blob(
    [stringManifest],
    {type: 'application/json'}
);

const manifestURL = URL.createObjectURL(blob);

document.querySelector('#manifest-placeholder')
.setAttribute('href', manifestURL);

/* HIDE URL BAR */
window.addEventListener('load', () => {
    setTimeout(() => {
        window.scrollTo(0,1);
    },100);
});

</script>

</body>
</html>


<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Preloader</title>
    <style>
        /* पेज के मार्जिन और पैडिंग को हटाना ताकि चित्र पूरी स्क्रीन पर आए */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* बैकग्राउंड कलर */
        }

        /* प्रीलोडर की डिज़ाइन (इंस्टाग्राम स्टोरी स्टाइल) */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* नीचे दिए गए URL में अपनी इमेज का लिंक डालें */
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTwkJwiFb0BHeve5IuDoSyGXIscDmGeJgeRcbT-IhX3-dpqmcwZJAzO_MA&s=10'); 
            background-size: cover; /* इमेज को पूरी स्क्रीन पर फिट करने के लिए */
            background-position: center; /* इमेज को बीच में रखने के लिए */
            background-repeat: no-repeat;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* एक छोटा सा लोडिंग टेक्स्ट या एनीमेशन (वैकल्पिक) */
        .loading-text {
            color: white;
            font-size: 20px;
            font-family: Arial, sans-serif;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="preloader">
     
    </div>

    <script>
        // 3 सेकंड (3000 मिलीसेकंड) का टाइमर
        setTimeout(function() {
            
            // 3 सेकंड बाद प्रीलोडर को छुपा दें
            document.getElementById('preloader').style.display = 'none';

            // सीधे WhatsApp ऐप खोलने का लिंक
            window.location.href = "whatsapp://send"; 
            
            /* नोट: यदि आप किसी विशेष नंबर पर मैसेज भेजना चाहते हैं, तो ऊपर वाली लाइन हटाकर नीचे वाली लाइन का इस्तेमाल करें:
               window.location.href = "whatsapp://send?phone=+910000000000&text=Hello";
            */

        }, 3000); // 3000 का मतलब 3 सेकंड है
    </script>

</body>
</html>
